databases:
  - name: yarned-with-love-db
    databaseName: yarned_with_love
    user: yarned_with_love_user

services:
  - type: web
    name: yarned-with-love
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn yarned_with_love.wsgi:application --timeout 60 --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: RENDER_DATABASE_URL
        fromDatabase:
          name: yarned-with-love-db
          property: connectionString
