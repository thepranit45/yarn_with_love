app = "yarn-with-love" # You can change this or Fly will use it
primary_region = "sin" # Change to your preferred region, 'sin' is Singapore, 'iad' is US East, 'lhr' is London

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[deploy]
  release_command = "python manage.py migrate"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
